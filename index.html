<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الرواتب">

<title>نظام رواتب العمال</title>

<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --accent:#f0a500;--accent2:#e05a00;--green:#3fb950;--red:#f85149;
  --blue:#58a6ff;--text:#e6edf3;--muted:#8b949e;
  --safe-b:env(safe-area-inset-bottom,0px);
  --hh:52px;--nh:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);
  height:100vh;overflow:hidden;overscroll-behavior:none;}

/* HEADER */
.hdr{height:var(--hh);background:linear-gradient(135deg,#1a1200,#2a1f00);
  border-bottom:2px solid var(--accent);padding:0 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:fixed;top:0;left:0;right:0;z-index:100;
  box-shadow:0 4px 20px rgba(240,165,0,.15);}
.hdr h1{font-size:17px;font-weight:900;color:var(--accent);}

/* BOTTOM NAV */
.bnav{height:calc(var(--nh) + var(--safe-b));background:var(--surface);
  border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;
  z-index:100;display:flex;padding-bottom:var(--safe-b);}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;border:none;background:none;
  color:var(--muted);font-family:'Cairo',sans-serif;font-size:10px;cursor:pointer;}
.nbtn span{font-size:21px;line-height:1.1;}
.nbtn.on{color:var(--accent);}

/* VIEWS */
.view{display:none;position:fixed;
  top:var(--hh);left:0;right:0;
  bottom:calc(var(--nh) + var(--safe-b));
  overflow-y:auto;-webkit-overflow-scrolling:touch;}
.view.on{display:block;}

/* ── WORKERS LIST ── */
#vw{padding:10px;}
.wrow{background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;margin-bottom:7px;
  display:flex;align-items:center;gap:10px;cursor:pointer;}
.wrow:active{border-color:var(--accent);transform:scale(.99);}
.wav{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:12px;color:#000;}
.winf{flex:1;min-width:0;}
.wnam{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wmet{font-size:11px;color:var(--muted);}
.wbal{font-weight:900;font-size:13px;text-align:left;flex-shrink:0;line-height:1.3;}
.wbal.p{color:var(--green);}.wbal.n{color:var(--red);}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px;}

/* install banner */
.ibanner{background:linear-gradient(135deg,rgba(240,165,0,.14),rgba(224,90,0,.09));
  border:1px solid var(--accent);border-radius:10px;
  padding:10px 12px;margin-bottom:10px;
  display:flex;align-items:center;gap:10px;}
.ibanner-txt{flex:1;font-size:12px;}
.ibanner-txt strong{display:block;font-size:13px;color:var(--accent);}

/* ── DETAIL VIEW ── */
#vd{padding:0;}
.dtop{background:var(--surface);border-bottom:1px solid var(--border);
  padding:9px 12px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:10;}
.bkbtn{background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:2px 4px;}
.dtitle{flex:1;min-width:0;}
.dname{font-weight:900;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dwage{font-size:11px;color:var(--muted);}

/* stats strip - 4 cols */
.sstrip{display:grid;grid-template-columns:repeat(4,1fr);
  border-bottom:1px solid var(--border);}
.sm{padding:9px 3px;text-align:center;border-left:1px solid var(--border);}
.sm:last-child{border-left:none;}
.sml{font-size:9px;color:var(--muted);line-height:1.2;}
.smv{font-size:14px;font-weight:900;margin-top:1px;line-height:1.1;}
.ca{color:var(--accent);}.cg{color:var(--green);}.cr{color:var(--red);}.cb{color:var(--blue);}

/* detail body */
.dbody{padding:12px 11px 24px;}
.stitle{font-size:13px;font-weight:700;color:var(--muted);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.stitle::after{content:'';flex:1;height:1px;background:var(--border);}

/* week nav */
.wknav{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.wkbtn{background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:7px 13px;border-radius:8px;
  font-family:'Cairo',sans-serif;font-size:13px;cursor:pointer;flex-shrink:0;
  touch-action:manipulation;}
.wkbtn:active{border-color:var(--accent);color:var(--accent);}
.wkbtn[disabled]{opacity:.35;pointer-events:none;}
.wklbl{flex:1;font-weight:700;font-size:12px;color:var(--accent);text-align:center;}

/* ── DAY CARD ── */
.dcard{background:var(--surface);border:1px solid var(--border);
  border-radius:10px;margin-bottom:8px;overflow:hidden;}
.dcard.fri{border-color:rgba(88,166,255,.35);background:rgba(88,166,255,.04);}

/* row 1: name | attendance btn | earned */
.dr1{display:flex;align-items:center;gap:8px;padding:9px 11px;}

.dlabel{flex-shrink:0;width:68px;}
.dnar{font-weight:900;font-size:13px;}
.ddate{font-size:10px;color:var(--muted);margin-top:1px;}
.fbadge{background:rgba(88,166,255,.15);color:var(--blue);
  padding:1px 4px;border-radius:3px;font-size:9px;display:inline-block;}

/* attendance button - takes remaining space */
.attbtn{flex:1;padding:9px 6px;border-radius:7px;border:none;
  font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;touch-action:manipulation;text-align:center;line-height:1.2;}
.ap{background:rgba(63,185,80,.2);color:var(--green);border:1px solid var(--green);}
.aa{background:rgba(248,81,73,.2);color:var(--red);border:1px solid var(--red);}
.ah{background:rgba(240,165,0,.2);color:var(--accent);border:1px solid var(--accent);}
.afo{background:rgba(88,166,255,.1);color:var(--blue);border:1px solid rgba(88,166,255,.3);}

.dearn{flex-shrink:0;min-width:54px;text-align:left;
  font-weight:900;font-size:13px;color:var(--green);line-height:1.2;}
.dearn small{display:block;font-size:9px;font-weight:400;color:var(--muted);}
.dzero{flex-shrink:0;min-width:54px;text-align:left;color:var(--muted);font-size:18px;}

/* row 2: site — ALWAYS visible, no scroll needed */
.dr2{border-top:1px solid var(--border);
  display:flex;align-items:center;gap:7px;padding:7px 11px;
  background:rgba(255,255,255,.015);}
.sicon{font-size:14px;flex-shrink:0;line-height:1;}
.sinput{flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;padding:0;}
.sinput::placeholder{color:var(--muted);}

/* week total */
.wtotal{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.25);
  border-radius:10px;padding:10px 14px;margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center;}
.wtotal span{font-size:13px;color:var(--muted);}
.wtotal strong{font-size:16px;font-weight:900;color:var(--accent);}

/* TRANSACTIONS */
.addtrans{background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:11px;display:flex;
  flex-direction:column;gap:8px;margin-bottom:10px;}
.addtrans select,.addtrans input{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:10px 12px;border-radius:8px;
  font-family:'Cairo',sans-serif;font-size:14px;outline:none;width:100%;}
.addtrans select:focus,.addtrans input:focus{border-color:var(--accent);}
.tlist{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
.titem{display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:9px 10px;}
.ttag{padding:3px 7px;border-radius:4px;font-size:10px;font-weight:700;flex-shrink:0;}
.td{background:rgba(248,81,73,.15);color:var(--red);border:1px solid var(--red);}
.tw{background:rgba(240,165,0,.15);color:var(--accent);border:1px solid var(--accent);}
.tb{background:rgba(63,185,80,.15);color:var(--green);border:1px solid var(--green);}
.tnote{flex:1;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tamt{font-weight:700;font-size:13px;flex-shrink:0;}
.tamt.p{color:var(--green);}.tamt.n{color:var(--red);}

/* ATTENDANCE */
function tAtt(k,wid){
  const w=D.workers.find(x=>x.id===wid);if(!w)return;
  if(!w.attendance)w.attendance={};
  const c=w.attendance[k]||'absent';
  w.attendance[k]={absent:'present',present:'half',half:'absent'}[c]||'present';
  sv();rd();
}
function tFri(k,wid){
  const w=D.workers.find(x=>x.id==wid);if(!w)return;
  if(!w.attendance)w.attendance={};
  w.attendance[k]=w.attendance[k]==='present'?'absent':'present';
  sv();rd();
}
function ssite(k,wid,val){
  const w=D.workers.find(x=>x.id===wid);if(!w)return;
  if(!w.sites)w.sites={};w.sites[k]=val.trim();sv();
}
function chWk(dir){cWk+=dir;if(cWk>0)cWk=0;rd();}

/* TRANSACTIONS */
function addTr(wid){
  const w=D.workers.find(x=>x.id===wid);if(!w)return;
  const t=document.getElementById('tType').value;
  const a=parseFloat(document.getElementById('tAmt').value);
  const n=document.getElementById('tNote').value.trim();
  if(!a||a<=0){alert('أدخل مبلغاً صحيحاً');return;}
  if(!w.transactions)w.transactions=[];
  w.transactions.push({type:t,amount:a,note:n,date:new Date().toISOString()});
  sv();rd();
}
function dTrans(wid,i){
  const w=D.workers.find(x=>x.id===wid);if(!w)return;
  if(!confirm('حذف هذه المعاملة؟'))return;
  w.transactions.splice(i,1);sv();rd();
}

/* ADD/EDIT */
function openAdd(){
  document.getElementById('aN').value='';document.getElementById('aW').value='';
  document.getElementById('aF').value='off';document.getElementById('mAdd').style.display='flex';
  setTimeout(()=>document.getElementById('aN').focus(),250);
}
function addW(){
  const n=document.getElementById('aN').value.trim();
  const w=parseFloat(document.getElementById('aW').value);
  const f=document.getElementById('aF').value;
  if(!n){alert('أدخل اسم العامل');return;}
  if(!w||w<=0){alert('أدخل راتب اليوم');return;}
  D.workers.push({id:D.nid++,name:n,wage:w,friday:f,attendance:{},transactions:[],sites:{}});
  sv();cm('mAdd');rl();
}
function openE(wid){
  const w=D.workers.find(x=>x.id===wid);if(!w)return;
  document.getElementById('eId').value=wid;document.getElementById('eN').value=w.name;
  document.getElementById('eW').value=w.wage;document.getElementById('eF').value=w.friday;
  document.getElementById('mEdit').style.display='flex';
}
function saveE(){
  const wid=parseInt(document.getElementById('eId').value);
  const w=D.workers.find(x=>x.id===wid);if(!w)return;
  const n=document.getElementById('eN').value.trim();
  const wg=parseFloat(document.getElementById('eW').value);
  const f=document.getElementById('eF').value;
  if(!n||!wg||wg<=0){alert('أدخل البيانات');return;}
  w.name=n;w.wage=wg;w.friday=f;sv();cm('mEdit');rd();
}
function delW(){
  const wid=parseInt(document.getElementById('eId').value);
  const w=D.workers.find(x=>x.id===wid);if(!w)return;
  if(!confirm(`حذف "${w.name}" نهائياً؟`))return;
  D.workers=D.workers.filter(x=>x.id!==wid);sv();cm('mEdit');goBack();
}
function cm(id){document.getElementById(id).style.display='none';}
document.querySelectorAll('.ovl').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.style.display='none';});});

/* EXPORT/IMPORT */
function exportData(){
  const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`رواتب_${new Date().toLocaleDateString('ar-IQ').replace(/\//g,'-')}.json`;a.click();
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{const i=JSON.parse(ev.target.result);if(!i.workers)throw 0;
      if(!confirm(`استيراد ${i.workers.length} عامل؟ سيُستبدل الحالي.`))return;
      D=i;sv();rl();rs();alert('تم الاستيراد ✅');
    }catch{alert('ملف غير صالح');}
  };r.readAsText(f);e.target.value='';
}

/* SETTINGS */
function rs(){
  document.getElementById('stW').textContent=D.workers.length;
  const tot=D.workers.reduce((s,w)=>s+calc(w).bal,0);
  const el=document.getElementById('stT');
  el.textContent=`${tot>=0?'+':''}${tot.toLocaleString()} د.ع`;
  el.style.color=tot>=0?'var(--green)':'var(--red)';
}
